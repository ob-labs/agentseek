site_name: agentseek
site_url: https://ob-labs.github.io/agentseek/
repo_url: https://github.com/ob-labs/agentseek
site_description: A database-native Agent Harness for runtime data workflows, powered by Bub
edit_uri: edit/main/docs/
repo_name: ob-labs/agentseek

nav:
  - Home: index.md
  - Docs:
      - Overview: docs/index.md
      - Getting started: docs/getting-started.md
      - Configuration: docs/configuration.md
      - Extensions: docs/extensions.md
  - Blog:
      - Intro: blog/index.md
      - Introducing agentseek: blog/introducing-agentseek.md
  - Hub: hub.md

hooks:
  - docs/hooks.py
plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: false
      languages:
        - locale: en
          default: true
          name: English
          build: true
          nav_translations:
            Home: Home
            Docs: Docs
            Overview: Overview
            Getting started: Getting started
            Configuration: Configuration
            Extensions: Extensions
            Blog: Blog
            Intro: Intro
            Introducing agentseek: Introducing agentseek
            Hub: Hub
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Docs: 文档
            Overview: 总览
            Getting started: 快速开始
            Configuration: 配置
            Extensions: 扩展
            Blog: 博客
            Intro: 介绍
            Introducing agentseek: 认识 agentseek
            Hub: 目录
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/agentseek"]
theme:
  name: terminal
  custom_dir: docs/overrides

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ob-labs/agentseek
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentseek

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/hub.js
  - javascripts/theme.js
