site_name: agentseek
repo_url: https://github.com/ob-labs/agentseek
site_description: A database-native Agent Harness for runtime data workflows, powered by Bub
edit_uri: edit/main/docs/
repo_name: ob-labs/agentseek

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Extensions: extensions.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/agentseek"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ob-labs/agentseek
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentseek

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
