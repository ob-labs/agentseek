site_name: agentseek
site_url: https://ob-labs.github.io/agentseek/
repo_url: https://github.com/ob-labs/agentseek
site_description: A database-native Agent Harness for runtime data workflows, powered by Bub
edit_uri: edit/main/docs/
repo_name: ob-labs/agentseek

nav:
  - Home: index.md
  - Docs:
      - Overview: docs.md
      - Getting started: getting-started.md
      - Configuration: configuration.md
      - Extensions: extensions.md
  - Blog:
      - Intro: blog/index.md
      - Introducing agentseek: blog/introducing-agentseek.md
  - Hub: hub.md

hooks:
  - docs/hooks.py
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/agentseek"]
theme:
  name: terminal
  custom_dir: docs/overrides

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ob-labs/agentseek
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentseek

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/hub.js
  - javascripts/theme.js
