services:
  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  langchain-app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: langchain-otel-demo
    depends_on:
      - jaeger
    ports:
      - "8080:8080"

  agentseek-sidecar:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - .env
    working_dir: /workspace/examples/langchain_otel_sidecar
    command: ["bash", "-lc", "mkdir -p .agentseek && sleep infinity"]
    environment:
      AGENTSEEK_WORKSPACE_PATH: /workspace/examples/langchain_otel_sidecar
      AGENTSEEK_HOME: /workspace/examples/langchain_otel_sidecar/.agentseek
      AGENTSEEK_PROJECT: /workspace/examples/langchain_otel_sidecar/.agentseek/agentseek-project
      AGENTSEEK_MCP_CONFIG_PATH: /workspace/examples/langchain_otel_sidecar/.agents/mcp.json
      AGENTSEEK_TAPESTORE_SQLALCHEMY_URL: sqlite+pysqlite:////workspace/examples/langchain_otel_sidecar/.agentseek/agentseek-tapes.db
    depends_on:
      - jaeger
    stdin_open: true
    tty: true
    volumes:
      - ../..:/workspace
