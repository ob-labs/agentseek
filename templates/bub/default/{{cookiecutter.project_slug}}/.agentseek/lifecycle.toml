version = 1
template = "bub/default"
name = "{{ cookiecutter.project_name }}"

[tools]
required = ["uv", "node", "npm"]
optional = []

[paths]
required = ["frontend/package.json", "frontend/node_modules"]
optional = []

[env.BUB_MODEL]
required = true
description = "Model id used by Bub."

[env.BUB_API_KEY]
required = false
secret = true
description = "Generic model provider key."
aliases = ["BUB_OPENAI_API_KEY"]

[services.app]
url = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"

[services.gateway]
url = "http://127.0.0.1:{{ cookiecutter.gateway_port }}/agent"

[services.copilotkit]
url = "http://127.0.0.1:{{ cookiecutter.copilotkit_port }}/api/copilotkit"

[processes.gateway]
command = ["uv", "run", "bub", "gateway", "--enable-channel", "ag-ui"]
env = { BUB_STREAM_OUTPUT = "true", BUB_AG_UI_PORT = "{{ cookiecutter.gateway_port }}" }

[processes.frontend]
command = ["npm", "run", "dev"]
cwd = "frontend"
env = { FRONTEND_PORT = "{{ cookiecutter.frontend_port }}", COPILOTKIT_PORT = "{{ cookiecutter.copilotkit_port }}", BUB_AG_UI_AGENT_URL = "http://127.0.0.1:{{ cookiecutter.gateway_port }}/agent", VITE_BUB_AG_UI_URL = "http://127.0.0.1:{{ cookiecutter.gateway_port }}" }

[checks.gateway]
type = "http"
url = "http://127.0.0.1:{{ cookiecutter.gateway_port }}/agent"
timeout = 2
attempts = 3

[checks.frontend]
type = "http"
url = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"
timeout = 2
attempts = 3

[tasks.frontend]
description = "Install frontend dependencies."
command = ["npm", "install", "--prefix", "frontend"]
