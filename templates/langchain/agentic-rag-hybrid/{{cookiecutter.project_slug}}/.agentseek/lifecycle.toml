version = 1
template = "langchain/agentic-rag-hybrid"
name = "{{ cookiecutter.project_name }}"
env_file = ".env"

[tools]
required = ["uv", "node", "npm"]

[paths]
required = [
  "pyproject.toml",
  "langgraph.json",
  "frontend/package.json",
  "frontend/node_modules",
]

[env.AGENTSEEK_MODEL_PROVIDER]
required = true
default = "{{ cookiecutter.default_model_provider }}"
description = "LangChain model provider: openai, anthropic, or google_genai."

[env.AGENTSEEK_MODEL]
required = true
default = "{{ cookiecutter.default_model }}"
description = "Model id passed to LangChain chat model initialization."
aliases = ["BUB_MODEL"]

[env.SEEKDB_PATH]
required = true
default = "{{ cookiecutter.seekdb_path }}"
description = "Embedded SeekDB data directory used through langchain-oceanbase. Defaults outside the project tree to avoid LangGraph dev reloads while indexing."

[env.SEEKDB_DB_NAME]
required = true
default = "{{ cookiecutter.seekdb_db_name }}"
description = "SeekDB database name."

[env.IMAGE_TABLE_NAME]
required = true
default = "{{ cookiecutter.image_table_name }}"
description = "SeekDB collection/table for indexed image records."

[services.backend]
url = "http://127.0.0.1:2024"

[services.frontend]
url = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"

[processes.backend]
command = ["uv", "run", "langgraph", "dev", "--no-browser"]

[processes.frontend]
command = ["npm", "run", "dev"]
cwd = "frontend"

[checks.backend]
type = "http"
target = "http://127.0.0.1:2024"
timeout = 2
attempts = 3

[checks.custom_routes]
type = "http"
target = "http://127.0.0.1:2024/custom/health"
timeout = 2
attempts = 3

[checks.frontend]
type = "http"
target = "http://127.0.0.1:{{ cookiecutter.frontend_port }}"
timeout = 2
attempts = 3

[tasks.sync]
description = "Install Python dependencies."
command = ["uv", "sync"]

[tasks.frontend]
description = "Install frontend dependencies."
command = ["npm", "install", "--prefix", "frontend"]

[tasks.seekdb]
description = "Prepare the embedded SeekDB data directory."
command = ["uv", "run", "python", "-c", "from {{ cookiecutter.project_slug }}.settings import get_settings; s=get_settings(); s.seekdb_path.mkdir(parents=True, exist_ok=True); print(f'Embedded SeekDB data dir ready: {s.seekdb_path}')"]

[tasks.ingest-sample]
description = "Index the built-in hybrid-search starter image pack."
command = ["uv", "run", "ingest-images"]
